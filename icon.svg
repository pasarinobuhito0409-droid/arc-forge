<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9d5d"/>
      <stop offset="1" stop-color="#9fd0ff"/>
    </linearGradient>
    <radialGradient id="arc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#cfe8ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#9fd0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="#070a10"/>
  <rect x="14" y="14" width="484" height="484" rx="96" fill="none" stroke="#1b2534" stroke-width="10"/>

  <!-- アーク閃光（トーチ先端の光） -->
  <circle cx="350" cy="150" r="100" fill="url(#arc)"/>

  <!-- 溶接トーチ本体（斜め・ハンドル＋ノズル） -->
  <g transform="rotate(45 256 256)">
    <rect x="226" y="120" width="60" height="230" rx="18" fill="url(#g)" stroke="#fff3e6" stroke-width="6"/>
    <rect x="216" y="330" width="80" height="70" rx="16" fill="#39424f" stroke="#fff3e6" stroke-width="6"/>
    <path d="M226 120 L286 120 L272 66 Q256 46 240 66 Z" fill="#cfd8e3" stroke="#fff3e6" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- アーク光の粒（放射） -->
  <g stroke="#eef7ff" stroke-width="8" stroke-linecap="round">
    <line x1="350" y1="150" x2="350" y2="98"/>
    <line x1="350" y1="150" x2="397" y2="122"/>
    <line x1="350" y1="150" x2="397" y2="176"/>
  </g>
  <circle cx="350" cy="150" r="19" fill="#ffffff"/>

  <!-- 溶接ビード（うろこ模様の波線） -->
  <g fill="none" stroke="#ff9d5d" stroke-width="10" stroke-linecap="round" opacity="0.95">
    <path d="M90 410 q16 -26 32 0 q16 26 32 0 q16 -26 32 0 q16 26 32 0 q16 -26 32 0 q16 26 32 0 q16 -26 32 0 q16 26 32 0"/>
  </g>

  <text x="256" y="478" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#9fd0ff" letter-spacing="4">ARC FORGE</text>
</svg>
